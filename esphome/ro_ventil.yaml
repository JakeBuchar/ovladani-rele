esphome:
  name: ro-ventil
  friendly_name: "RO Napouštění vody"
  min_version: 2024.6.0

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

# Stejné chování jako v Arduino IDE (Hardware CDC)
logger:
  baud_rate: 115200

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "RO-Ventil-Fallback"
    password: "roventil123"

captive_portal:

# GPIO13 = relé ventilu (RELAY_ACTIVE_LOW false → normální logika)
switch:
  - platform: gpio
    pin: GPIO13
    name: "Ventil RO"
    id: ventil_ro
    icon: "mdi:pipe-valve"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - light.turn_on:
          id: status_led
          brightness: 16%
          red: 0%
          green: 100%
          blue: 0%
    on_turn_off:
      - light.turn_on:
          id: status_led
          brightness: 16%
          red: 100%
          green: 0%
          blue: 0%

# GPIO48 = vestavěná WS2812 RGB LED na desce
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "Status LED"
    pin: GPIO48
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    restore_mode: ALWAYS_OFF

# Volitelný senzor stavu pro automatizace v HA
binary_sensor:
  - platform: template
    name: "Ventil RO otevřen"
    id: ventil_otevren
    lambda: 'return id(ventil_ro).state;'
